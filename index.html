<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple | DevOps Ready</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #f5f7fc 0%, #e9eef4 100%);
      font-family: system-ui, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      max-width: 650px;
      width: 100%;
      padding: 2rem;
      transition: 0.2s;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(120deg, #1e293b, #2d3e50);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #4b5563;
      border-left: 3px solid #94a3b8;
      padding-left: 1rem;
      margin-bottom: 1.5rem;
    }
    p {
      color: #1f2937;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    button {
      background: #1e293b;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #0f172a;
      transform: scale(1.02);
    }
    footer {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #6c757d;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>✨ simple · tested · live</h1>
  <div class="sub">CI/CD with real syntax validation</div>
  <p>This page is automatically validated for HTML errors on every push.</p>
  <p>If any tag is unclosed, attribute malformed, or structure invalid → the pipeline <strong>fails</strong>.</p>
  <button type="button" id="helloBtn">say hello</button>
  <footer>⚡ deployed via GitHub Pages + DevOps pipeline</footer>
</div>
<script>
  document.getElementById('helloBtn')?.addEventListener('click', () => alert('Hello from validated HTML!'));
</script>
</body>
</html>
