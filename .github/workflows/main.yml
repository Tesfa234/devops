name: Validate HTML syntax & deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔍 Install html-validate
        run: npm install -g html-validate

      - name: ✅ HTML syntax validation (with inline config)
        run: |
          cat > .htmlvalidate.json << 'EOF'
          {
            "extends": ["html-validate:recommended"],
            "rules": {
              "void-style": "off",
              "no-inline-style": "off",
              "attr-quotes": "error",
              "close-order": "error"
            }
          }
          EOF
          html-validate "**/*.html" --config .htmlvalidate.json

      - name: 🧪 Check required tags
        run: |
          for file in $(find . -name "*.html"); do
            if ! grep -q "<!DOCTYPE html>" "$file"; then
              echo "❌ Missing DOCTYPE in $file"
              exit 1
            fi
            if ! grep -q "<title>" "$file"; then
              echo "❌ Missing <title> in $file"
              exit 1
            fi
          done

      - name: 🌐 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📂 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
